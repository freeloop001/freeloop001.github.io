---
layout: default
---

<article class="post-content">
  <h1>{{ page.title }}</h1>
  <div class="post-meta">
    <time>{{ page.date | date: "%Y年%m月%d日 %H:%M:%S" }}</time>
    {% if page.categories %}
      <span> • {{ page.categories | join: ", " }}</span>
    {% endif %}
  </div>

  {{ content }}

  {% if page.tags %}
  <div class="post-tags">
    {% for tag in page.tags %}
      <span class="post-tag">{{ tag }}</span>
    {% endfor %}
  </div>
  {% endif %}
</article>

<div style="text-align: center; margin-top: 32px;">
  <a href="/" style="color: var(--accent); text-decoration: none; font-weight: 500;">← 返回首页</a>
</div>
